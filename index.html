<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tarjeta de Presentacion</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <div class="header">
            <div class="logo">
                <img src="logo.jpeg" alt="Logo ARTE">
            </div>
            <div class="subtitle">GERARDO JARA</div>
            <div class="subtitle">Dibujante</div>
        </div>

        <div class="content"> 
            
            <div class="info-item">
                <div class="icon"><i class="fab fa-facebook-f"></i></div>
                <div class="info-text">
                    <a href="https://www.facebook.com/TU_PAGINA" target="_blank">Facebook Amante Del Grafito</a>
                </div>
            </div>
        
            <div class="info-item">
                <div class="icon"><i class="fab fa-instagram"></i></div>
                <div class="info-text">
                    <a href="https://www.instagram.com/talabarteriaChillán/" target="_blank">@GerardoArte</a>
                </div>
            </div>

            <div class="info-item">
                <div class="icon"><i class="fab fa-whatsapp"></i></div>
                <div class="info-text">
                    <a href="https://wa.me/56946427289" target="_blank">WhatsApp Gerardo Jara</a>
                </div>
            </div>

            <div class="info-item">
                <div class="icon"><i class="fas fa-map-marker-alt"></i></div>
                <div class="info-text">
                    <a href="https://maps.google.com">Ubicación</a>
                </div>
            </div>

            <div class="divider"></div>

            <div class="qr-section">
                <div class="qr-code">
                    <img src="QR.png" alt="Código QR">
                </div>
            </div>
        </div> <div class="footer">
           
        </div>
    </div>
</body>
</html>
